    <title>Proton Home</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;

        font-family: InterVariable, system-ui, sans-serif;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background-color: rgb(27, 19, 64);
      }

      #content-container {
        display: flex;
        padding: 4rem;
        width: 100%;
        min-height: 100%;
      }

      #content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        background-color: rgb(255, 255, 255);
        border-radius: 12px;
        position: relative;
      }

      .proton-logo {
        position: absolute;
        top: 1rem;
        left: 2rem;
      }

      @media (max-width: 768px) {
        .proton-logo {
          position: initial;
          margin-top: 1rem;
          margin-bottom: 0.5rem;
        }
      }

      .disclaimer {
        width: 100%;
        position: absolute;
        bottom: 0.2rem;
        padding: 0 0.5rem;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.75rem;
        color: #666;
        text-align: center;
      }

      @media (max-width: 768px) {
        .disclaimer {
          position: initial;
          transform: none;
          margin-top: 2rem;
          margin-bottom: 1rem;
        }
      }

      /* Utility classes to replace Tailwind */
      .unstyled {
        list-style: none;
      }

      .my-0 {
        margin-top: 0;
        margin-bottom: 0;
      }

      .p-4 {
        padding: 1rem;
      }

      /* Grid layout for apps */
      .apps-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2rem;
        margin: 0 auto;
      }

      .apps-grid .dropdown-item[data-app="mail"] {
        order: 1;
      }

      .apps-grid .dropdown-item[data-app="calendar"] {
        order: 2;
      }

      .apps-grid .dropdown-item[data-app="vpn"] {
        order: 3;
      }

      .apps-grid .dropdown-item[data-app="drive"] {
        order: 4;
      }

      .apps-grid .dropdown-item[data-app="docs"] {
        order: 5;
      }

      .apps-grid .dropdown-item[data-app="sheets"] {
        order: 6;
      }

      .apps-grid .dropdown-item[data-app="pass"] {
        order: 7;
      }

      .apps-grid .dropdown-item[data-app="wallet"] {
        order: 8;
      }

      .apps-grid .dropdown-item[data-app="lumo"] {
        order: 9;
      }

      .apps-grid .dropdown-item[data-app="meet"] {
        order: 10;
      }

      @media (max-width: 560px) {
        .apps-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 360px) {
        .apps-grid {
          grid-template-columns: repeat(1, 1fr);
        }
      }

      .dropdown-item {
        display: flex;
        justify-content: center;
      }

      .dropdown-item .relative {
        transition: background-color 0.2s ease;
      }

      .dropdown-item:hover .relative {
        background-color: rgba(194, 193, 192, 0.2);
      }

      .text-center {
        text-align: center;
      }

      .text-no-decoration {
        text-decoration: none;
      }

      .outline-none--at-all {
        outline: none;
      }

      .flex {
        display: flex;
      }

      .flex-column {
        flex-direction: column;
      }

      .items-center {
        align-items: center;
      }

      .justify-center {
        justify-content: center;
      }

      .relative {
        position: relative;
      }

      .rounded-lg {
        border-radius: 0.5rem;
      }

      .rounded {
        border-radius: 0.25rem;
      }

      .border {
        border: 1px solid;
      }

      .border-weak {
        border-color: rgba(0, 0, 0, 0.1);
      }

      .w-custom {
        width: var(--w-custom);
      }

      .h-custom {
        height: var(--h-custom);
      }

      .mx-auto {
        margin-left: auto;
        margin-right: auto;
      }

      .shrink-0 {
        flex-shrink: 0;
      }

      .block {
        display: block;
      }

      .text-sm {
        font-size: 0.875rem;
        line-height: 1.25rem;
      }

      .mt-1 {
        margin-top: 0.25rem;
      }

      .text-semibold {
        font-weight: 600;
      }

      .absolute {
        position: absolute;
      }

      .text-ellipsis {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
